*{box-sizing:border-box;margin:0;padding:0}
body{background:#10173D;font-family:'Poppins',sans-serif;color:#F0F2F5;min-height:100vh;padding:24px 18px 60px}
.card{background:#182048;border:1px solid #2A3362;border-radius:12px;padding:16px}
.kpi-grid{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.kpi{background:#182048;border:1px solid #2A3362;border-radius:12px;padding:14px 16px;flex:1 1 130px;min-width:120px}
.kpi-label{font-size:10px;font-weight:600;color:#5C6370;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.kpi-value{font-size:22px;font-weight:800;color:#F0F2F5;line-height:1}
.kpi-sub{font-size:10px;color:#9BA3B0;margin-top:4px}
.tab-row{display:flex;background:#10173D;border-radius:10px;max-width:420px;margin:0 auto 14px;border:1px solid #2A3362;overflow:hidden}
.tab-btn{flex:1;padding:10px 14px;border:none;cursor:pointer;font-weight:700;font-size:12px;font-family:'Poppins',sans-serif;background:#10173D;color:#5C6370;transition:all .2s}
.tab-btn.active{background:#34FFA4;color:#10173D}
.pill-row{display:flex;gap:6px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.pill{padding:6px 14px;border-radius:20px;border:1px solid #2A3362;cursor:pointer;font-weight:600;font-size:11px;font-family:'Poppins',sans-serif;background:transparent;color:#5C6370;transition:all .2s}
.pill.active{background:rgba(52,255,164,.12);border-color:#34FFA4;color:#34FFA4}
.sec{display:flex;align-items:center;gap:8px;margin:26px 0 12px}
.sec h3{font-size:13px;font-weight:700;color:#F0F2F5;margin:0}
.sec-sub{font-size:10px;color:#5C6370;margin-top:1px}
.story{background:linear-gradient(135deg,#182048 0%,#0D1535 100%);border:1px solid rgba(52,255,164,.2);border-radius:12px;padding:16px 18px;margin-top:22px}
.story-title{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.story-bar{width:3px;height:14px;border-radius:2px;background:#34FFA4;flex-shrink:0}
.story-text{font-size:12px;line-height:1.8;color:#9BA3B0}
.ep-row{background:#182048;border-radius:10px;padding:11px 14px;border:1px solid #2A3362;display:flex;align-items:center;gap:10px;margin-bottom:6px}
.ep-num{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.side-by-side{display:flex;gap:12px;flex-wrap:wrap;align-items:stretch}
.half-card{flex:1 1 280px;background:#182048;border:1px solid #2A3362;border-radius:12px;padding:16px;display:flex;flex-direction:column}
.post-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.type-tag{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:600}
.progress-bar{height:4px;border-radius:2px;background:#2A3362;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:2px}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:#10173D}
::-webkit-scrollbar-thumb{background:#2A3362;border-radius:3px}
button:focus{outline:none}
canvas{max-height:220px}
</style>
</head>

const sum=(a)=>a.reduce((s,x)=>s+x,0);
const sumK=(a,k)=>a.reduce((s,x)=>s+(x[k]||0),0);
const avgK=(a,k)=>a.length?sumK(a,k)/a.length:0;
const fmt=n=>typeof n==="number"?n.toLocaleString():n;

let platform="linkedin", period="ytd", podSeries="all";
let charts={};

function getPosts(){
  if(period==="jan") return LI_JAN;
  if(period==="feb") return LI_FEB;
  if(period==="mar") return LI_MAR;
  return [...LI_JAN,...LI_FEB,...LI_MAR];
}
function getActive(){ return getPosts().filter(p=>p.eng>0); }

function pLabel(){
  if(period==="jan") return "January 2026";
  if(period==="feb") return "February 2026";
  if(period==="mar") return "March 2026";
  if(period==="2025") return "2025 Full Year";
  return "Q1 2026 YTD";
}

function liStats(){
  const active=getActive();
  return {
    posts:getPosts().length,
    imp:sumK(active,"imp"),
    eng:avgK(active,"eng").toFixed(1),
    clicks:sumK(active,"clicks"),
    likes:sumK(active,"likes"),
    newFollowers:period==="jan"?98:period==="feb"?30:period==="mar"?15:143,
    totalFollowers:period==="jan"?2335:period==="feb"?2365:period==="mar"?2393:2393,
  };
}

function gaStats(){
  if(period==="jan") return GA_26_MO[0];
  if(period==="feb") return GA_26_MO[1];
  if(period==="mar") return GA_26_MO[2];
  if(period==="ytd") return {
    users:GA_26_MO[0].users+GA_26_MO[1].users+GA_26_MO[2].users,
    sessions:GA_26_MO[0].sessions+GA_26_MO[1].sessions+GA_26_MO[2].sessions,
    pv:GA_26_MO[0].pv+GA_26_MO[1].pv+GA_26_MO[2].pv,
  };

}

function kpi(label,value,sub){
  return `<div class="kpi"><div class="kpi-label">${label}</div><div class="kpi-value">${value}</div>${sub?`<div class="kpi-sub">${sub}</div>`:""}</div>`;
}

function secHTML(icon,title,sub=""){
  return `<div class="sec"><span style="font-size:15px">${icon}</span><div><h3>${title}</h3>${sub?`<div class="sec-sub">${sub}</div>`:""}</div></div>`;
}

function storyHTML(title,text){
  return `<div class="story"><div class="story-title"><div class="story-bar"></div><h4 style="font-size:12px;font-weight:700;color:${C.green};margin:0">${title}</h4></div><div class="story-text">${text}</div></div>`;
}

function destroyChart(id){
  if(charts[id]){charts[id].destroy();delete charts[id];}
}

function renderApp(){
  document.getElementById("app").innerHTML = buildHTML();
  attachListeners();
  setTimeout(renderCharts, 50);
}

function buildHTML(){
  let html = buildHeader() + buildTabs() + buildPills();
  if(platform==="linkedin") html += buildLinkedin();
  else if(platform==="website") html += buildWebsite();
  else html += buildPodcast();
  html += `<div style="text-align:center;margin-top:32px;padding-top:14px;border-top:1px solid ${C.border};font-size:9px;color:${C.t3}">
    Telegraph · Marketing Dashboard · LinkedIn + GA4 + Buzzsprout<br>Last updated ${LAST_UPDATED}
  </div>`;
  return html;
}

function buildHeader(){

      <span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:3px;color:${C.green}">Telegraph Marketing</span>
    </div>
    <h1 style="font-size:48px;font-weight:800;color:#fff;margin:0 0 8px;letter-spacing:-2px;line-height:1.1">Marketing <span style="color:${C.green}">Dashboard</span></h1>

    <div style="display:inline-flex;align-items:center;gap:5px;background:${C.bgCard};border:1px solid ${C.border};border-radius:20px;padding:6px 16px">

function buildTabs(){

function buildPills(){
  if(platform==="podcast") return "";
  const pills=[["ytd","Q1 2026 YTD"],["jan","January"],["feb","February"],["mar","March"],["2025","2025 Full Year"]];
  return `<div class="pill-row">${pills.map(([v,l])=>`<button class="pill ${period===v?"active":""}" data-period="${v}">${l}</button>`).join("")}</div>`;

  // Content type analysis
  const counts={};
  const engByType={};
  active.forEach(p=>{
    counts[p.type]=(counts[p.type]||0)+1;
    if(!engByType[p.type]) engByType[p.type]={total:0,count:0};
    engByType[p.type].total+=p.eng; engByType[p.type].count+=1;
  });
  const typeData=Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const total=typeData.reduce((s,[,v])=>s+v,0);

  const top10=[...active].sort((a,b)=>b.eng-a.eng).slice(0,10);

  const contentMixRows=typeData.map(([name,count],i)=>{
    const e=engByType[name];
    const ae=e?(e.total/e.count).toFixed(1):"—";
    const pct=Math.round((count/total)*100);
    const col=TYPE_COLORS[name]||C.blue;
    return `<div style="margin-bottom:8px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px">
        <div style="width:10px;height:10px;border-radius:2px;background:${col};flex-shrink:0"></div>
        <div style="font-size:11px;font-weight:600;color:${C.t1};flex:1">${name}</div>
        <div style="font-size:11px;font-weight:700;color:${C.t1}">${count} posts</div>

    const active=getActive();
    if(period==="2025"){
      const el=document.getElementById("chart2025LI");
      if(el){
        charts.li2025=new Chart(el,{type:"bar",data:{labels:LI_2025.map(m=>m.m),datasets:[{label:"Posts",data:LI_2025.map(m=>m.posts),backgroundColor:C.green+"cc",borderRadius:3,yAxisID:"y"},{label:"Avg Eng %",data:LI_2025.map(m=>m.avgEng),type:"line",borderColor:C.periwinkle,backgroundColor:"transparent",borderWidth:2,pointRadius:2,yAxisID:"y1"}]},options:{...baseOpts,scales:{x:{ticks:tick,grid:{color:grid}},y:{ticks:tick,grid:{color:grid}},y1:{position:"right",ticks:{...tick,color:C.periwinkle},grid:{display:false}}}}});
      }
    } else {
      const elLI=document.getElementById("chartLI");
      if(elLI){
        const labels=active.map(p=>p.date.replace(/Jan |Feb |Mar /,""));
        charts.li=new Chart(elLI,{type:"bar",data:{labels,datasets:[{label:"Impressions",data:active.map(p=>p.imp),backgroundColor:C.green+"cc",borderRadius:3,yAxisID:"y"},{label:"Eng %",data:active.map(p=>p.eng),type:"line",borderColor:C.periwinkle,backgroundColor:"transparent",borderWidth:2,pointRadius:2,yAxisID:"y1"}]},options:{...baseOpts,scales:{x:{ticks:{...tick,maxRotation:45,autoSkip:true,maxTicksLimit:period==="ytd"?15:18},grid:{color:grid}},y:{ticks:tick,grid:{color:grid}},y1:{position:"right",ticks:{...tick,color:C.periwinkle},grid:{display:false}}}}});
      }
      const elPie=document.getElementById("chartPie");
      if(elPie){
        const counts={};
        active.forEach(p=>{counts[p.type]=(counts[p.type]||0)+1;});
        const entries=Object.entries(counts);
        charts.pie=new Chart(elPie,{type:"doughnut",data:{labels:entries.map(([n])=>n),datasets:[{data:entries.map(([,v])=>v),backgroundColor:entries.map(([n])=>TYPE_COLORS[n]||C.blue),borderWidth:2,borderColor:C.bgCard}]},options:{...baseOpts,cutout:"55%",plugins:{legend:{display:false},tooltip:{backgroundColor:C.bgCard,titleColor:C.green,bodyColor:C.t2,borderColor:C.border,borderWidth:1}}}});
      }
    }
  }

  if(platform==="website"){
    if(period==="2025"){
      const el=document.getElementById("chart2025GA");
      if(el){
        charts.ga2025=new Chart(el,{type:"bar",data:{labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],datasets:[{label:"Sessions",data:GA_2025_SESSIONS,backgroundColor:C.green+"cc",borderRadius:3}]},options:{...baseOpts,scales:{x:{ticks:tick,grid:{color:grid}},y:{ticks:tick,grid:{color:grid}}}}});
      }
    } else {
      const el=document.getElementById("chartGA");
      if(el){
        let data=period==="jan"?GA_JAN:period==="feb"?GA_FEB:period==="mar"?GA_MAR:[...GA_JAN,...GA_FEB,...GA_MAR];
        let labels=data.map((_,i)=>i+1+"");
        if(period==="ytd"){
          const step=Math.ceil(data.length/40);
          data=data.filter((_,i)=>i%step===0);
          labels=data.map((_,i)=>i*step+1+"");
        }
        charts.ga=new Chart(el,{type:"line",data:{labels,datasets:[{label:"Sessions",data,borderColor:C.green,backgroundColor:C.green+"22",borderWidth:2,pointRadius:0,fill:true,tension:.3}]},options:{...baseOpts,scales:{x:{ticks:{...tick,maxTicksLimit:12},grid:{color:grid}},y:{ticks:tick,grid:{color:grid},beginAtZero:true}}}});
      }
    }
  }

  if(platform==="podcast"){
    const el=document.getElementById("chartPod");
    if(el){
      charts.pod=new Chart(el,{type:"line",data:{labels:POD_TREND_LABELS,datasets:[{label:"Downloads",data:POD_TREND,borderColor:C.green,backgroundColor:C.green+"22",borderWidth:2,pointRadius:3,fill:true,tension:.3}]},options:{...baseOpts,scales:{x:{ticks:{...tick,maxRotation:45,autoSkip:false},grid:{color:grid}},y:{ticks:tick,grid:{color:grid},beginAtZero:true}}}});
    }
  }
}

function attachListeners(){
  document.querySelectorAll("[data-tab]").forEach(btn=>{
    btn.addEventListener("click",()=>{platform=btn.dataset.tab;renderApp();});
  });
  document.querySelectorAll("[data-period]").forEach(btn=>{
    btn.addEventListener("click",()=>{period=btn.dataset.period;renderApp();});
  });
  document.querySelectorAll("[data-pod]").forEach(btn=>{
    btn.addEventListener("click",()=>{podSeries=btn.dataset.pod;renderApp();});
  });
}

renderApp();
</script>
</body>
</html>
