const avg = (a,k) => a.length ? sum(a,k)/a.length : 0;

  const good = val >= goal;
  return (
    <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:5,
      background:good?C.greenDim:C.redDim,color:good?C.green:C.red,
      display:"inline-block",marginTop:4}}>
      {good?"✓":"↓"} Goal: {goal}{unit}
    </span>
  );
};

const Kpi = ({label,value,sub,goalVal,goalUnit,goalCompare,noGoal}) => {
  const cv = goalCompare !== undefined ? goalCompare : parseFloat(value);
  return (
    <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:12,
      padding:"14px 16px",flex:"1 1 140px",minWidth:130}}>
      <div style={{fontSize:10,fontWeight:600,color:C.t3,textTransform:"uppercase",

      {!noGoal && goalVal!==undefined && <Tag val={cv} goal={goalVal} unit={goalUnit||""}/>}

const YoYCard = ({label,cur,prev,curLabel,prevLabel}) => {
  const change=(((cur-prev)/prev)*100).toFixed(0), up=change>0;
  return (
    <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:10,
      padding:"12px 14px",flex:1,minWidth:100}}>
      <div style={{fontSize:9,color:C.t3,fontWeight:600,marginBottom:3,
        textTransform:"uppercase",letterSpacing:0.6}}>{label} YoY</div>
      <div style={{fontSize:18,fontWeight:800,color:up?C.green:C.red}}>
        {up?"+":""}{change}%
      </div>
      <div style={{fontSize:9,color:C.t2,marginTop:2}}>{fmt(cur)} vs {fmt(prev)}</div>
      <div style={{fontSize:9,color:C.t3}}>{curLabel} vs {prevLabel}</div>
    </div>
  );
};

  const sorted=[...posts].sort((a,b)=>b.eng-a.eng).slice(0,5);

                {TT_EPS.map((ep,i) => (
                  <div key={i} style={{background:C.bgCard,borderRadius:10,padding:"11px 14px",border:`1px solid ${i===0?C.periwinkle+"55":C.border}`,display:"flex",alignItems:"center",gap:10}}>
                    <div style={{width:26,height:26,borderRadius:6,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,flexShrink:0,color:i===0?C.bgDark:C.t1,background:i===0?C.periwinkle:i===1?C.border:"transparent",border:i>1?`1px solid ${C.border}`:"none"}}>{i+1}</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontWeight:600,color:C.t1,fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ep.title}</div>
                      <div style={{marginTop:5,height:4,borderRadius:2,background:C.border,overflow:"hidden"}}>
                        <div style={{width:`${Math.round((ep.downloads/TT_EPS[0].downloads)*100)}%`,height:"100%",background:C.periwinkle,borderRadius:2,opacity:0.8}}/>
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                      <div style={{fontSize:17,fontWeight:800,color:C.periwinkle}}>{ep.downloads}</div>
                      <div style={{fontSize:9,color:C.t3}}>{ep.date}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          <Sec icon="📱" title="Platform Breakdown" sub="Last 5 episodes · Buzzsprout data"/>
          <div style={{background:C.bgCard,borderRadius:12,padding:"16px",border:`1px solid ${C.border}`,display:"flex",flexDirection:"column",gap:10}}>
            {POD_APPS.map((a,i) => (
              <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:110,fontSize:11,color:C.t2,flexShrink:0}}>{a.app}</div>
                <div style={{flex:1,height:8,borderRadius:4,background:C.border,overflow:"hidden"}}>
                  <div style={{width:`${a.pct}%`,height:"100%",background:a.color,borderRadius:4,opacity:0.85}}/>
                </div>
                <div style={{width:50,textAlign:"right",fontSize:11,fontWeight:700,color:C.t1,flexShrink:0}}>
                  {a.pct}% <span style={{color:C.t3,fontWeight:400}}>({a.count})</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{background:`linear-gradient(135deg,${C.bgCard},${C.bgDeep})`,border:`1px solid ${C.periwinkle}33`,borderRadius:12,padding:"16px 18px",marginTop:18,display:"flex",alignItems:"center",gap:16}}>
            <div style={{fontSize:32,fontWeight:800,color:C.periwinkle,lineHeight:1}}>{POD_PREDICTED}</div>
            <div>
              <div style={{fontSize:12,fontWeight:700,color:C.periwinkle,marginBottom:3}}>Buzzsprout Episode Predictor</div>
              <div style={{fontSize:11,color:C.t2,lineHeight:1.6}}>Forecasted downloads for the next episode within its first 90 days. Consistent publishing + LinkedIn promotion can push this higher.</div>
            </div>
          </div>
          <Story title="Podcast — Key Takeaways">
            <p style={{margin:0}}><span style={{color:C.green,fontWeight:600}}>707 total downloads</span> since launch. "The Age of Visibility" leads at 282 downloads — nearly 4x the next episode. <span style={{color:C.green,fontWeight:600}}>Apple Podcasts (36%) + Spotify (24%)</span> cover 60% of the audience. The Buzzsprout predictor forecasts <span style={{color:C.periwinkle,fontWeight:600}}>{POD_PREDICTED} downloads</span> for the next episode — pairing each drop with a LinkedIn clip post has historically outperformed that baseline.</p>
          </Story>
        </div>
      )}

      {/* FOOTER */}
      <div style={{textAlign:"center",marginTop:32,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
        <div style={{fontSize:9,color:C.t3}}>Telegraph · Marketing Dashboard · LinkedIn Organic + Google Analytics 4</div>
        <div style={{fontSize:9,color:C.t3,marginTop:2}}>Data via Windsor.ai · Last updated {LAST_UPDATED}</div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(Dashboard), document.getElementById("root"));
</script>
</body>
</html>
